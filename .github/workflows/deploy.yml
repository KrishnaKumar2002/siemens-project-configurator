name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # Deploy automatically on every push to main
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

# Required permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─── Job 1: Build Angular App ────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # Extract the repo name from GITHUB_REPOSITORY (format: "owner/repo-name")
      # and use it as the --base-href so Angular routes work on GitHub Pages
      - name: Build Angular for GitHub Pages
        working-directory: frontend
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "Building with base-href: /$REPO_NAME/"
          npx ng build --configuration=production --base-href "/$REPO_NAME/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the Angular compiled output (not the whole repo)
          path: frontend/dist/frontend/browser

  # ─── Job 2: Deploy to GitHub Pages ───────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build          # Only runs if build job succeeds
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

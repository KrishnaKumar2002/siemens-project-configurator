name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Angular for GitHub Pages
        working-directory: frontend
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "Building with base-href: /$REPO_NAME/"
          npm run build -- --configuration=production --base-href "/$REPO_NAME/" --deploy-url "/$REPO_NAME/"

      - name: Prepare Pages directory
        run: |
          rm -rf public
          mkdir -p public
          cp -R frontend/dist/frontend/browser/* public/
          # .nojekyll tells GitHub Pages not to run Jekyll (needed for _angular files)
          touch public/.nojekyll
          # SPA fallback: copy index.html as 404.html so deep links work
          cp public/index.html public/404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
